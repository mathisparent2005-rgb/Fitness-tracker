// STORE — staat, XP/level, streak, gewicht, calorieën (localStorage)

const STORAGE_KEY = 'cadence.fitness.v1';
const XP_PER_SUCCESS = 250;
const XP_BONUS_STREAK_MILESTONE = 500;

const PORTION_MULTIPLIERS = { klein: 0.8, normaal: 1.0, groot: 1.3 };

const BELEG_SCHELLETJES = [
  { name: 'Salami', kcalPerSchel: 40 },
  { name: 'Kaas', kcalPerSchel: 50 },
  { name: 'Hespeworst', kcalPerSchel: 35 },

const BELEG_SMEERBAAR = [
  { name: 'Préparé',    kcal: { licht: 60,  normaal: 120, dik: 180 } },
  { name: 'Krabsalade', kcal: { licht: 55,  normaal: 110, dik: 165 } },
  { name: 'Vleessalade',kcal: { licht: 65,  normaal: 130, dik: 195 } },
];

const LEVEL_THRESHOLDS = Array.from({ length: 50 }, (_, i) => {
  const lvl = i + 1;
  return 200 * (lvl - 1) + 50 * (lvl - 1) * (lvl - 2);
});

function todayKey(d = new Date()) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function levelForXp(xp) {
  let lvl = 1;
  for (let i = 0; i < LEVEL_THRESHOLDS.length; i++) {
    if (xp >= LEVEL_THRESHOLDS[i]) lvl = i + 1; else break;
  }
  return lvl;
}

function xpProgress(xp) {
  const lvl = levelForXp(xp);
  const curThresh = LEVEL_THRESHOLDS[lvl - 1] ?? 0;
  const nextThresh = LEVEL_THRESHOLDS[lvl] ?? curThresh + 1000;
  const xpInLevel = xp - curThresh;
  const xpForLevel = nextThresh - curThresh;
  return {
    level: lvl, xpInLevel, xpForLevel,
    xpToNext: Math.max(0, nextThresh - xp),
    pct: Math.min(100, (xpInLevel / xpForLevel) * 100),
  };
}

function tierLabel(lvl) {
  if (lvl < 5)  return 'Starter';
  if (lvl < 10) return 'Consistent';
  if (lvl < 20) return 'Dedicated';
  if (lvl < 35) return 'Atleet';
  return 'Elite';
}

function defaultState() {
  return {
    streak: 0, bestStreak: 0, totalXp: 0, calorieGoal: 2000,
    today: { date: todayKey(), workout: false, calories: false, creatine: false, completed: false, success: false },
    history: {}, workouts: {}, weights: {}, dailyCalories: {}, dailyMuscles: {}, dailyFoodLog: {}, restDays: {}, dayNotes: {}, lastGain: null,
  };
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    if (parsed.today?.date !== todayKey()) {
      const prev = parsed.today;
      if (prev && !prev.completed) {
        parsed.history = parsed.history || {};
        parsed.history[prev.date] = { workout: !!prev.workout, calories: !!prev.calories, creatine: !!prev.creatine, success: false, autoClosed: true };
        parsed.streak = 0;
      }
      const todayCals = parsed.dailyCalories?.[todayKey()] || 0;
      parsed.today = { date: todayKey(), workout: false, calories: todayCals >= (parsed.calorieGoal || 2000), creatine: false, completed: false, success: false };
      saveState(parsed);
    }
    return { ...defaultState(), ...parsed };
  } catch(e) { return defaultState(); }
}

function buildWeekWindow(state, days = 7) {
  const out = [];
  const today = new Date();
  const DAY_LETTERS = ['Z','M','D','W','D','V','Z'];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = todayKey(d);
    const isToday = i === 0;
    const isRest = !!(state.restDays?.[key]);
    const entry = state.history[key];
    let status, label, goalPct;
    if (isToday) {
      const got = [state.today.workout, state.today.calories, state.today.creatine].filter(Boolean).length;
      goalPct = Math.round((got / 3) * 100);
      if (state.today.completed) {
        status = state.today.success ? 'done' : 'missed';
        label = state.today.success ? '✓' : got > 0 ? `${got}/3` : '✗';
      } else {
        status = 'today'; label = `${got}/3`;
      }
    } else if (isRest) {
      status = 'rest'; label = 'R'; goalPct = -1;
    } else if (!entry) {
      status = 'empty'; label = '·'; goalPct = -1;
    } else if (entry.success) {
      status = 'done'; label = '✓'; goalPct = 100;
    } else {
      const got = [entry.workout, entry.calories, entry.creatine].filter(Boolean).length;
      goalPct = Math.round((got / 3) * 100);
      status = 'missed'; label = got > 0 ? `${got}/3` : '✗';
    }
    out.push({ dayLetter: DAY_LETTERS[d.getDay()], date: d.getDate(), key, status, label, isToday, isRest, goalPct });
  }
  return out;
}

function dayStatusColor(status, goalPct, isRest) {
  if (isRest) return '#94a3b8';
  if (status === 'today') return '#1e293b';
  if (status === 'empty') return '#f1f5f9';
  if (goalPct >= 100) return '#22c55e';
  if (goalPct >= 66)  return '#86efac';
  if (goalPct >= 33)  return '#fb923c';
  return '#ef4444';
}

function dayTextColor(status, goalPct, isRest) {
  if (status === 'empty') return '#94a3b8';
  if (!isRest && goalPct >= 66 && goalPct < 100) return '#14532d';
  return 'white';
}

const StoreContext = React.createContext(null);

function StoreProvider({ children }) {
  const [state, setState] = React.useState(() => loadState());

  React.useEffect(() => { saveState(state); }, [state]);
  React.useEffect(() => {
    const onFocus = () => { if (state.today.date !== todayKey()) setState(loadState()); };
    window.addEventListener('focus', onFocus);
    return () => window.removeEventListener('focus', onFocus);
  }, [state.today.date]);

  const toggleCheck = (key) => setState(s => s.today.completed ? s : { ...s, today: { ...s.today, [key]: !s.today[key] } });

  const completeDay = () => setState(s => {
    if (s.today.completed) return s;
    const success = s.today.workout && s.today.calories && s.today.creatine;
    const newStreak = success ? s.streak + 1 : 0;
    const milestoneBonus = success && newStreak > 0 && newStreak % 7 === 0 ? XP_BONUS_STREAK_MILESTONE : 0;
    const xpGained = success ? XP_PER_SUCCESS + milestoneBonus : 0;
    const prevLevel = levelForXp(s.totalXp);
    const newXp = s.totalXp + xpGained;
    const newLevel = levelForXp(newXp);
    return {
      ...s, streak: newStreak, bestStreak: Math.max(s.bestStreak, newStreak), totalXp: newXp,
      today: { ...s.today, completed: true, success },
      history: { ...s.history, [s.today.date]: { workout: s.today.workout, calories: s.today.calories, creatine: s.today.creatine, success } },
      lastGain: { xp: xpGained, success, milestone: milestoneBonus > 0, levelUp: newLevel > prevLevel, newLevel, newStreak },
    };
  });

  const resetDay = () => setState(s => ({
    ...s, today: { date: todayKey(), workout: false, calories: false, creatine: false, completed: false, success: false }, lastGain: null,
  }));

  const dismissGain = () => setState(s => ({ ...s, lastGain: null }));

  const resetAll = () => { if (!confirm('Reset all progress? This cannot be undone.')) return; setState(defaultState()); };

  const setWorkout = (date, title) => setState(s => {
    const next = { ...(s.workouts || {}) };
    const trimmed = (title || '').trim();
    if (!trimmed) { delete next[date]; }
    else { const ex = next[date] || {}; next[date] = { title: trimmed, completed: !!ex.completed, muscles: ex.muscles || [], createdAt: ex.createdAt || new Date().toISOString(), completedAt: ex.completedAt || null }; }
    return { ...s, workouts: next };
  });

  const toggleDailyMuscle = (date, muscle) => setState(s => {
    const current = s.dailyMuscles?.[date] || [];
    const muscles = current.includes(muscle) ? current.filter(m => m !== muscle) : [...current, muscle];
    return { ...s, dailyMuscles: { ...(s.dailyMuscles || {}), [date]: muscles } };
  });

  const setDailyMuscles = (date, muscles) => setState(s => {
    const next = { ...(s.dailyMuscles || {}), [date]: muscles };
    const isToday = date === todayKey();
    const workoutDone = muscles.length > 0;
    const todayPatch = isToday && !s.today.completed ? { today: { ...s.today, workout: workoutDone } } : {};
    return { ...s, dailyMuscles: next, ...todayPatch };
  });

  const toggleWorkoutComplete = (date) => setState(s => {
    const w = s.workouts?.[date]; if (!w) return s;
    const completed = !w.completed;
    const next = { ...s.workouts, [date]: { ...w, completed, completedAt: completed ? new Date().toISOString() : null } };
    const isToday = date === todayKey();
    const todayPatch = isToday && !s.today.completed ? { today: { ...s.today, workout: completed } } : {};
    return { ...s, workouts: next, ...todayPatch };
  });

  const deleteWorkout = (date) => setState(s => { const next = { ...(s.workouts || {}) }; delete next[date]; return { ...s, workouts: next }; });

  const logWeight = (date, kg) => setState(s => {
    const parsed = parseFloat(String(kg).replace(',', '.'));
    if (isNaN(parsed) || parsed <= 0) return s;
    return { ...s, weights: { ...s.weights, [date]: Math.round(parsed * 10) / 10 } };
  });

  const deleteWeight = (date) => setState(s => { const next = { ...s.weights }; delete next[date]; return { ...s, weights: next }; });

  const logCalories = (date, kcal) => setState(s => {
    const parsed = parseInt(String(kcal), 10);
    if (isNaN(parsed) || parsed < 0) return s;
    const next = { ...s.dailyCalories, [date]: parsed };
    const isToday = date === todayKey();
    const meetsGoal = parsed >= s.calorieGoal;
    const todayPatch = isToday && !s.today.completed ? { today: { ...s.today, calories: meetsGoal } } : {};
    return { ...s, dailyCalories: next, ...todayPatch };
  });

  const setCalorieGoal = (goal) => setState(s => {
    const parsed = parseInt(String(goal), 10);
    if (isNaN(parsed) || parsed <= 0) return s;
    const todayCals = s.dailyCalories[todayKey()] || 0;
    const todayPatch = !s.today.completed ? { today: { ...s.today, calories: todayCals >= parsed } } : {};
    return { ...s, calorieGoal: parsed, ...todayPatch };
  });

  const addFoodItem = (date, item) => setState(s => {
    const log = [...(s.dailyFoodLog?.[date] || []), item];
    const total = log.reduce((sum, i) => sum + i.portionKcal, 0);
    const isToday = date === todayKey();
    const meetsGoal = total >= s.calorieGoal;
    const todayPatch = isToday && !s.today.completed ? { today: { ...s.today, calories: meetsGoal } } : {};
    return { ...s, dailyFoodLog: { ...(s.dailyFoodLog || {}), [date]: log }, dailyCalories: { ...s.dailyCalories, [date]: total }, ...todayPatch };
  });

  const deleteFoodItem = (date, index) => setState(s => {
    const log = (s.dailyFoodLog?.[date] || []).filter((_, i) => i !== index);
    const total = log.reduce((sum, i) => sum + i.portionKcal, 0);
    const isToday = date === todayKey();
    const meetsGoal = total >= s.calorieGoal;
    const todayPatch = isToday && !s.today.completed ? { today: { ...s.today, calories: meetsGoal } } : {};
    return { ...s, dailyFoodLog: { ...(s.dailyFoodLog || {}), [date]: log }, dailyCalories: { ...s.dailyCalories, [date]: total }, ...todayPatch };
  });

  const toggleRestDay = (date) => setState(s => {
    const next = { ...(s.restDays || {}) };
    if (next[date]) delete next[date]; else next[date] = true;
    return { ...s, restDays: next };
  });

  const setDayNote = (date, note) => setState(s => ({
    ...s, dayNotes: { ...(s.dayNotes || {}), [date]: note }
  }));

  const editDayChecks = (date, checks) => setState(s => {
    if (date === todayKey()) {
      if (s.today.completed) return s;
      return { ...s, today: { ...s.today, ...checks } };
    }
    const existing = s.history[date] || {};
    const merged = { ...existing, ...checks };
    return { ...s, history: { ...s.history, [date]: { ...merged, success: !!(merged.workout && merged.calories && merged.creatine) } } };
  });

  const duplicateDay = (fromDate, toDate) => setState(s => {
    const log = s.dailyFoodLog?.[fromDate] || [];
    if (!log.length) return s;
    const newLog = [...(s.dailyFoodLog?.[toDate] || []), ...log];
    const total = newLog.reduce((sum, i) => sum + i.portionKcal, 0);
    const isToday = toDate === todayKey();
    const meetsGoal = total >= s.calorieGoal;
    const todayPatch = isToday && !s.today.completed ? { today: { ...s.today, calories: meetsGoal } } : {};
    return { ...s, dailyFoodLog: { ...(s.dailyFoodLog || {}), [toDate]: newLog }, dailyCalories: { ...s.dailyCalories, [toDate]: total }, ...todayPatch };
  });

  const value = {
    state, toggleCheck, completeDay, resetDay, dismissGain, resetAll,
    setWorkout, toggleWorkoutComplete, toggleDailyMuscle, setDailyMuscles, deleteWorkout,
    logWeight, deleteWeight, logCalories, setCalorieGoal, addFoodItem, deleteFoodItem,
    toggleRestDay, setDayNote, editDayChecks, duplicateDay,
    progress: xpProgress(state.totalXp), XP_PER_SUCCESS, todayKey,
  };

  return <StoreContext.Provider value={value}>{children}</StoreContext.Provider>;
}

function useStore() {
  const ctx = React.useContext(StoreContext);
  if (!ctx) throw new Error('useStore must be used inside StoreProvider');
  return ctx;
}

function Card({ children, className = '' }) {
  return <div className={`bg-white rounded-2xl border border-slate-100 shadow-sm ${className}`}>{children}</div>;
}

function Button({ children, variant = 'primary', className = '', disabled, ...rest }) {
  const base = 'inline-flex items-center justify-center gap-2 rounded-xl font-semibold transition-all active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed select-none';
  const variants = {
    primary:   'bg-slate-900 text-white py-3 px-5 text-sm',
    secondary: 'bg-slate-100 text-slate-700 py-3 px-5 text-sm',
    ghost:     'text-slate-500 py-2 px-3 text-sm hover:text-slate-900 hover:bg-slate-50',
    danger:    'bg-red-50 text-red-600 py-2.5 px-4 text-sm',
    brand:     'bg-teal-500 text-white py-3 px-5 text-sm shadow-sm',
  };
  return <button className={`${base} ${variants[variant] || variants.primary} ${className}`} disabled={disabled} {...rest}>{children}</button>;
}

function Input({ className = '', ...rest }) {
  return (
    <input className={`w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 text-base
      focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition-shadow
      placeholder:text-slate-300 ${className}`} {...rest} />
  );
}

function ProgressBar({ value, max, color = 'teal', className = '' }) {
  const pct = Math.min(100, Math.round((value / Math.max(max, 1)) * 100));
  const colors = { teal: '#14b8a6', green: '#22c55e', amber: '#f59e0b', violet: '#8b5cf6', red: '#f87171' };
  return (
    <div className={`rounded-full bg-slate-100 overflow-hidden ${className}`}>
      <div className="h-full rounded-full transition-all duration-500" style={{ width: `${pct}%`, background: colors[color] || colors.teal }} />
    </div>
  );
}

function Badge({ children, color = 'slate' }) {
  const colors = {
    slate: 'bg-slate-100 text-slate-600', green: 'bg-green-50 text-green-700',
    red: 'bg-red-50 text-red-600',        amber: 'bg-amber-50 text-amber-700',
    teal: 'bg-teal-50 text-teal-700',     violet: 'bg-violet-50 text-violet-700',
  };
  return <span className={`text-xs font-semibold px-2.5 py-1 rounded-lg ${colors[color] || colors.slate}`}>{children}</span>;
}

function SectionLabel({ children }) {
  return <p className="text-xs font-bold uppercase tracking-widest text-slate-400 px-1 mb-2">{children}</p>;
}

function Stat({ label, value, unit, hint }) {
  return (
    <Card className="p-3 text-center">
      <div className="text-xs font-semibold text-slate-400 mb-1">{label}</div>
      <div className="flex items-baseline gap-1 justify-center">
        <div className="text-2xl font-bold font-mono text-slate-900">{value}</div>
        {unit && <div className="text-xs text-slate-400">{unit}</div>}
      </div>
      {hint && <div className="text-xs text-slate-400 mt-1">{hint}</div>}
    </Card>
  );
}

function Celebration({ gain, onDismiss }) {
  if (!gain) return null;
  const isSuccess = gain.success;
  const emoji = gain.levelUp ? '🏆' : isSuccess ? '🔥' : '😤';
  const title = gain.levelUp ? `Level ${gain.newLevel}!` : isSuccess ? 'Dag voltooid!' : 'Dag gemist';
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm" onClick={onDismiss}>
      <div className="bg-white rounded-t-3xl sm:rounded-3xl px-8 pt-8 pb-10 w-full sm:max-w-sm text-center animate-pop-in shadow-2xl" onClick={e => e.stopPropagation()}>
        <div className="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-6 sm:hidden" />
        <div className="text-7xl mb-4 animate-slide-up">{emoji}</div>
        <h2 className="text-2xl font-bold text-slate-900 mb-2">{title}</h2>
        {isSuccess ? (
          <>
            <p className="text-teal-600 font-mono text-3xl font-bold mt-1">+{gain.xp} XP</p>
            {gain.milestone && (
              <div className="mt-3 bg-amber-50 rounded-xl px-4 py-2.5">
                <p className="text-amber-600 font-semibold text-sm">🏅 7-daagse milestone! +500 bonus XP</p>
              </div>
            )}
            {gain.levelUp && (
              <div className="mt-3 bg-violet-50 rounded-xl px-4 py-2.5">
                <p className="text-violet-600 font-semibold text-sm">⬆️ Level up naar level {gain.newLevel}!</p>
              </div>
            )}
            {gain.newStreak > 1 && <p className="text-slate-400 text-sm mt-4">🔥 {gain.newStreak} dagen streak — blijf zo!</p>}
          </>
        ) : (
          <p className="text-slate-500 text-sm mt-2 leading-relaxed">Je hebt niet alle doelen gehaald. Je streak is gereset. Probeer het morgen opnieuw!</p>
        )}
        <button onClick={onDismiss} className="mt-7 w-full py-4 bg-slate-900 text-white rounded-2xl font-semibold text-base active:scale-95 transition-transform">
          Doorgaan
        </button>
      </div>
    </div>
  );
}

const MUSCLE_GROUPS = ['Chest', 'Schouders', 'Voorarmen', 'Rug', 'Buikspieren', 'Benen', 'Biceps', 'Triceps'];

function MuscleCheckboxes({ muscles = [], onToggle }) {
  return (
    <div className="grid grid-cols-2 gap-2">
      {MUSCLE_GROUPS.map(m => {
        const checked = muscles.includes(m);

              ${checked ? 'border-teal-500 bg-teal-500' : 'border-slate-300'}`}>
              {checked && <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.5L5 9L9.5 3.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>

          </button>
        );

function WorkoutPlanner() {
  const { state, setDailyMuscles, todayKey } = useStore();
  const today = todayKey();
  const dailyMuscles = state.dailyMuscles || {};
  const savedMuscles = dailyMuscles[today];
  const isSaved = Array.isArray(savedMuscles) && savedMuscles.length > 0;

  const [draft, setDraft] = React.useState(isSaved ? savedMuscles : []);
  const [editing, setEditing] = React.useState(!isSaved);

  React.useEffect(() => {
    const saved = dailyMuscles[today] || [];
    setDraft(saved.length > 0 ? saved : []);
    setEditing(saved.length === 0);
  }, [today]);

  const toggleDraft = (muscle) =>
    setDraft(prev => prev.includes(muscle) ? prev.filter(m => m !== muscle) : [...prev, muscle]);

  const handleSave = () => { if (!draft.length) return; setDailyMuscles(today, draft); setEditing(false); };
  const handleEdit = () => { setDraft(savedMuscles || []); setEditing(true); };
  const handleDelete = () => { setDailyMuscles(today, []); setDraft([]); setEditing(true); };

  const allDone = Object.entries(dailyMuscles).filter(([, m]) => Array.isArray(m) && m.length > 0);
  const totalLogged = allDone.length;

  const today_js = new Date();
  const weekKeys = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today_js); d.setDate(today_js.getDate() - i);
    return [d.getFullYear(), String(d.getMonth() + 1).padStart(2, '0'), String(d.getDate()).padStart(2, '0')].join('-');
  });
  const thisWeekCount = weekKeys.filter(k => (dailyMuscles[k] || []).length > 0).length;
  const score = Math.round((thisWeekCount / 7) * 100);

  const history = allDone.filter(([d]) => d !== today).sort((a, b) => b[0].localeCompare(a[0]));

  return (
    <div className="space-y-4">
      <div className="pt-2">
        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">{new Date().toLocaleDateString('nl-BE', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
        <h1 className="text-2xl font-bold text-slate-900 mt-0.5">Workout Planner</h1>
      </div>

      <div className="grid grid-cols-3 gap-3">
        <Stat label="Gelogd" value={totalLogged} unit="dagen" />
        <Stat label="Deze week" value={`${thisWeekCount}/7`} />
        <Stat label="Score" value={totalLogged ? `${score}%` : '—'} />
      </div>

      <Card className="p-4">
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-bold text-slate-900">Vandaag</h2>
          {isSaved && !editing && <Badge color="green">✓ Gedaan</Badge>}
        </div>
        {editing ? (
          <div className="space-y-4">
            <p className="text-sm text-slate-500">Vink de spiergroepen aan die je vandaag hebt getraind.</p>
            <MuscleCheckboxes muscles={draft} onToggle={toggleDraft} />
            <div className="flex gap-2 pt-1">
              <Button onClick={handleSave} variant={draft.length > 0 ? 'brand' : 'secondary'} className="flex-1" disabled={draft.length === 0}>
                Opslaan
              </Button>
              {isSaved && (
                <Button onClick={() => { setDraft(savedMuscles); setEditing(false); }} variant="secondary">
                  Annuleer
                </Button>
              )}
            </div>
          </div>
        ) : (
          <div className="space-y-3">
            <div className="flex flex-wrap gap-2 pb-1">
              {(savedMuscles || []).map(m => (
                <span key={m} className="bg-teal-50 text-teal-700 font-semibold text-sm px-3 py-1.5 rounded-xl">{m}</span>
              ))}
            </div>
            <div className="flex gap-2">
              <Button onClick={handleEdit} variant="secondary" className="flex-1">Bewerken</Button>
              <Button onClick={handleDelete} variant="danger">Wis</Button>
            </div>
          </div>
        )}
      </Card>

      {history.length > 0 && (
        <div>
          <SectionLabel>Geschiedenis</SectionLabel>
          <Card>
            <ul className="divide-y divide-slate-100">
              {history.map(([date, muscles]) => (
                <li key={date} className="px-4 py-3.5">
                  <p className="text-xs text-slate-400 font-mono mb-2">{fmtDate(date)}</p>
                  <div className="flex flex-wrap gap-1.5">
                    {muscles.map(m => (
                      <span key={m} className="text-xs bg-teal-50 text-teal-600 font-semibold px-2.5 py-1 rounded-lg">{m}</span>
                    ))}
                  </div>
                </li>
              ))}
            </ul>
          </Card>
        </div>
      )}

      {history.length === 0 && !isSaved && (
        <Card className="p-8 text-center"><p className="text-3xl mb-3">💪</p><p className="text-slate-400 text-sm">Selecteer de spiergroepen die je vandaag traint en sla op.</p></Card>
      )}
    </div>
  );
}

function fmtDate(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('nl-BE', { weekday: 'short', day: 'numeric', month: 'short' });
}

// GEWICHT TRACKER
// ═══════════════════════════════════════════════════════════════════════════════

function WeightTracker() {
  const { state, logWeight, deleteWeight, todayKey } = useStore();
  const today = todayKey();
  const weights = state.weights || {};
  const [input, setInput] = React.useState('');

  const entries = Object.entries(weights).sort((a, b) => a[0] < b[0] ? -1 : 1);
  const latestWeight = entries.length ? entries[entries.length - 1][1] : null;
  const firstWeight  = entries.length > 1 ? entries[0][1] : null;
  const totalChange  = latestWeight !== null && firstWeight !== null ? (latestWeight - firstWeight).toFixed(1) : null;
  const todayLogged  = weights[today];

  const handleLog = () => { const val = input.trim(); if (!val) return; logWeight(today, val); setInput(''); };

  return (
    <div className="space-y-4">
      <div className="pt-2">
        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Voortgang</p>
        <h1 className="text-2xl font-bold text-slate-900 mt-0.5">Gewicht Tracker</h1>
      </div>

      <div className="grid grid-cols-3 gap-3">
        <Stat label="Huidig" value={latestWeight ?? '—'} unit={latestWeight ? 'kg' : ''} />
        <Stat label="Verandering" value={totalChange !== null ? (parseFloat(totalChange) > 0 ? `+${totalChange}` : totalChange) : '—'} unit={totalChange !== null ? 'kg' : ''} />
        <Stat label="Metingen" value={entries.length} unit="totaal" />
      </div>

      <Card className="p-4">
        <h2 className="font-bold text-slate-900 mb-3">{todayLogged ? `Vandaag: ${todayLogged} kg` : 'Log gewicht'}</h2>
        <div className="flex gap-2">
          <Input type="number" inputMode="decimal" step="0.1" min="30" max="300" value={input}
            onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLog()}
            placeholder={todayLogged ? `${todayLogged} (overschrijven)` : 'bv. 75.5'} className="flex-1" />
          <Button onClick={handleLog} variant="brand">Log</Button>
        </div>
        {todayLogged && <p className="text-xs text-slate-400 mt-2">Huidig: <span className="font-mono font-semibold">{todayLogged} kg</span>. Nieuw getal overschrijft.</p>}
      </Card>

      {entries.length >= 2 && (
        <Card className="p-4">
          <h2 className="font-bold text-slate-900 mb-4">Trend</h2>
          <WeightChart entries={entries.slice(-30)} />
        </Card>
      )}
      {entries.length === 1 && <Card className="p-4 text-center"><p className="text-slate-400 text-sm">Log nog 1 meting om de grafiek te zien.</p></Card>}

      {entries.length > 0 && (
        <div>
          <SectionLabel>Geschiedenis</SectionLabel>
          <Card>
            <ul className="divide-y divide-slate-100">
              {[...entries].reverse().slice(0, 20).map(([date, weight], i, arr) => {
                const prevWeight = arr[i + 1]?.[1];
                const delta = prevWeight !== undefined ? (weight - prevWeight).toFixed(1) : null;
                const isToday = date === today;
                return (

                      <span className={`text-xs font-mono font-bold shrink-0 ${parseFloat(delta) < 0 ? 'text-green-500' : parseFloat(delta) > 0 ? 'text-red-400' : 'text-slate-400'}`}>
                        {parseFloat(delta) > 0 ? `+${delta}` : delta} kg
                      </span>
                    )}
                    <button onClick={() => deleteWeight(date)} className="text-slate-200 hover:text-red-400 transition-colors p-2 -mr-2 shrink-0">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                  </li>
                );

          </Card>
        </div>
      )}

      {entries.length === 0 && (
        <Card className="p-10 text-center"><p className="text-4xl mb-3">⚖️</p><p className="text-slate-500 text-sm">Log je eerste gewicht om te beginnen met bijhouden.</p></Card>
      )}
    </div>
  );
}

function WeightChart({ entries }) {
  const values = entries.map(([, v]) => v);
  const minV = Math.min(...values), maxV = Math.max(...values);
  const range = maxV - minV || 1;
  const W = 300, H = 110, padL = 36, padR = 8, padT = 8, padB = 20;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  const pts = entries.map(([, val], i) => ({
    x: padL + (entries.length > 1 ? i / (entries.length - 1) : 0.5) * plotW,
    y: padT + plotH - ((val - minV) / range) * plotH,
    val,
  }));

  const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const last = pts[pts.length - 1], first = pts[0];
  const areaD = `${pathD} L${last.x.toFixed(1)},${(padT + plotH).toFixed(1)} L${first.x.toFixed(1)},${(padT + plotH).toFixed(1)}Z`;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 160 }}>
      {[minV, (minV + maxV) / 2, maxV].map((v, i) => {
        const y = padT + plotH - ((v - minV) / range) * plotH;
        return (
          <React.Fragment key={i}>
            <line x1={padL} x2={W - padR} y1={y} y2={y} stroke="#f1f5f9" strokeWidth="1" />
            <text x={padL - 4} y={y + 4} textAnchor="end" fontSize="7" fill="#94a3b8" fontFamily="monospace">{v.toFixed(1)}</text>
          </React.Fragment>
        );
      })}
      <path d={areaD} fill="#14b8a6" fillOpacity="0.08" />
      <path d={pathD} fill="none" stroke="#14b8a6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {pts.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="3" fill="#14b8a6" />)}
      {entries.length >= 2 && <>
        <text x={pts[0].x} y={H - 4} textAnchor="middle" fontSize="7" fill="#94a3b8" fontFamily="monospace">{fmtDateShort(entries[0][0])}</text>
        <text x={pts[pts.length - 1].x} y={H - 4} textAnchor="middle" fontSize="7" fill="#94a3b8" fontFamily="monospace">{fmtDateShort(entries[entries.length - 1][0])}</text>
      </>}
    </svg>
  );
}

function fmtDateShort(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('nl-BE', { day: 'numeric', month: 'short' });
}

function HistoryView({ onClose, onDayClick }) {
  const { state, todayKey } = useStore();
  const tk = todayKey();
  const [filter, setFilter] = React.useState('all');

  const allDates = React.useMemo(() => {
    const keys = new Set([
      ...Object.keys(state.history || {}),
      ...Object.keys(state.dailyCalories || {}),
      ...Object.keys(state.dailyFoodLog || {}),
      ...Object.keys(state.restDays || {}),
    ]);
    keys.delete(tk);
    return [...keys].sort((a, b) => b.localeCompare(a));
  }, [state, tk]);

  const today_js = new Date();
  const mkOffset = (days) => { const d = new Date(today_js); d.setDate(today_js.getDate() - days); return todayKey(d); };
  const weekStart = mkOffset(7);
  const monthStart = mkOffset(30);

  const filtered = allDates.filter(date => {
    if (filter === 'week')    return date >= weekStart;
    if (filter === 'month')   return date >= monthStart;
    if (filter === 'success') return !!state.history[date]?.success;
    if (filter === 'rest')    return !!(state.restDays?.[date]);
    return true;
  });

  const successDays = allDates.filter(d => state.history[d]?.success).length;
  const restDaysCount = Object.keys(state.restDays || {}).filter(d => d !== tk).length;
  const calEntries = allDates.filter(d => (state.dailyCalories?.[d] || 0) > 0);
  const avgCals = calEntries.length
    ? Math.round(calEntries.reduce((s, d) => s + (state.dailyCalories[d] || 0), 0) / calEntries.length)
    : 0;

  return (
    <div className="fixed inset-0 z-50 bg-slate-50 overflow-y-auto">

            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div className="grid grid-cols-2 gap-3 mb-4">
          <Stat label="Succesvolle dagen" value={successDays} />
          <Stat label="Rustdagen" value={restDaysCount} />
          <Stat label="Gem. calorieën" value={avgCals > 0 ? avgCals.toLocaleString('nl-BE') : '—'} unit={avgCals > 0 ? 'kcal' : ''} />
          <Stat label="Beste streak" value={state.bestStreak} unit="d" />
        </div>

        <div className="flex gap-2 overflow-x-auto mb-4 pb-1" style={{ scrollbarWidth: 'none' }}>
          {[
            { id: 'all', label: 'Alles' }, { id: 'week', label: 'Afgelopen week' },

            <button key={f.id} onClick={() => setFilter(f.id)}

        {filtered.length === 0 ? (
          <Card className="p-8 text-center">

          <Card>
            <ul className="divide-y divide-slate-100">
              {filtered.map(date => {
                const entry = state.history[date] || {};
                const isRest = !!(state.restDays?.[date]);
                const cals = state.dailyCalories?.[date] || 0;
                const hasNote = !!(state.dayNotes?.[date]);
                const goalCount = [entry.workout, entry.calories, entry.creatine].filter(Boolean).length;
                const goalPct = Math.round((goalCount / 3) * 100);
                const bg = dayStatusColor(isRest ? 'rest' : (entry.success ? 'done' : 'missed'), isRest ? -1 : goalPct, isRest);
                const tc = dayTextColor(isRest ? 'rest' : (entry.success ? 'done' : 'missed'), isRest ? -1 : goalPct, isRest);
                return (
                  <li key={date}>
                    <button onClick={() => onDayClick(date)}
                      className="w-full flex items-center gap-3 px-4 py-3.5 text-left hover:bg-slate-50 active:bg-slate-100 transition-colors">

function FoodLogModal({ onClose, onAdd, todayCals }) {
  const [tab, setTab] = React.useState('list');
  const [catIndex, setCatIndex] = React.useState(0);
  const [selectedItem, setSelectedItem] = React.useState(null);
  const [portion, setPortion] = React.useState('normaal');
  const [selectedBeleg, setSelectedBeleg] = React.useState(null);
  const [belegQty, setBelegQty] = React.useState(null);
  const [customName, setCustomName] = React.useState('');
  const [customKcal, setCustomKcal] = React.useState('');
  const [customPortion, setCustomPortion] = React.useState('normaal');
  const [lastAdded, setLastAdded] = React.useState(null);

  const isBroodCat = FOOD_CATEGORIES[catIndex]?.name === 'Brood';
  const PORTION_LABELS = { klein: 'Klein', normaal: 'Normaal', groot: 'Groot' };
  const allBeleg = [
    ...BELEG_SCHELLETJES.map(b => ({ ...b, type: 'schelletjes' })),
    ...BELEG_SMEERBAAR.map(b => ({ ...b, type: 'smeerbaar' })),
  ];

  const resetBreadState = () => { setSelectedItem(null); setSelectedBeleg(null); setBelegQty(null); };

  const handleCatChange = (i) => { setCatIndex(i); resetBreadState(); setPortion('normaal'); };

  const handleSelectBread = (item) => {
    if (selectedItem?.name === item.name) { resetBreadState(); return; }
    setSelectedItem(item);
    setSelectedBeleg(null);
    setBelegQty(null);
  };

  const handleSelectBeleg = (beleg) => {
    if (selectedBeleg?.name === beleg.name) { setSelectedBeleg(null); setBelegQty(null); return; }
    setSelectedBeleg(beleg);
    setBelegQty(beleg.type === 'schelletjes' ? 2 : 'normaal');
  };

  const getBelegKcal = () => {
    if (!selectedBeleg || belegQty === null) return 0;
    return selectedBeleg.type === 'schelletjes'
      ? selectedBeleg.kcalPerSchel * belegQty
      : selectedBeleg.kcal[belegQty];
  };

  const breadTotalKcal = selectedItem && isBroodCat && selectedBeleg && belegQty !== null
    ? selectedItem.kcal + getBelegKcal()
    : 0;

  const handleAddBread = () => {
    if (!selectedItem || !selectedBeleg || belegQty === null) return;
    const belegKcal = getBelegKcal();
    const totalKcal = selectedItem.kcal + belegKcal;
    const qtyLabel = selectedBeleg.type === 'schelletjes'
      ? `${belegQty} ${belegQty === 1 ? 'schel' : 'schellen'}`
      : { licht: 'licht gesmeerd', normaal: 'normaal gesmeerd', dik: 'dik gesmeerd' }[belegQty];
    const name = `${selectedItem.name} + ${selectedBeleg.name} (${qtyLabel})`;
    onAdd({ name, portion: 'normaal', baseKcal: totalKcal, portionKcal: totalKcal });
    setLastAdded({ name, portionKcal: totalKcal, breadKcal: selectedItem.kcal, belegKcal, isBread: true });
    resetBreadState();
  };

  const handleAddItem = () => {
    if (!selectedItem) return;
    const portionKcal = Math.round(selectedItem.kcal * PORTION_MULTIPLIERS[portion]);
    onAdd({ name: selectedItem.name, portion, baseKcal: selectedItem.kcal, portionKcal });
    setLastAdded({ name: selectedItem.name, portion, portionKcal, isBread: false });
    setSelectedItem(null);
    setPortion('normaal');
  };

  const handleAddCustom = () => {
    const base = parseInt(customKcal, 10);
    if (!customKcal || isNaN(base) || base <= 0) return;
    const name = customName.trim() || 'Aangepast gerecht';
    const portionKcal = Math.round(base * PORTION_MULTIPLIERS[customPortion]);
    onAdd({ name, portion: customPortion, baseKcal: base, portionKcal });
    setLastAdded({ name, portion: customPortion, portionKcal, isBread: false });
    setCustomName('');
    setCustomKcal('');
    setCustomPortion('normaal');
  };

  const selectedKcal = selectedItem && !isBroodCat ? Math.round(selectedItem.kcal * PORTION_MULTIPLIERS[portion]) : 0;
  const customBase = parseInt(customKcal, 10) || 0;

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-sm" onClick={onClose}>
      <div className="bg-white rounded-t-3xl w-full max-w-lg flex flex-col animate-pop-in shadow-2xl" style={{ maxHeight: '85vh' }} onClick={e => e.stopPropagation()}>
        <div className="w-10 h-1 bg-slate-200 rounded-full mx-auto mt-3 mb-2 flex-shrink-0" />
        <div className="flex items-center justify-between px-4 pb-3 flex-shrink-0">
          <h2 className="text-lg font-bold text-slate-900">Log calorieën</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 p-1">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        {lastAdded && (
          <div className="mx-4 mb-3 px-4 py-2.5 bg-teal-50 rounded-xl flex-shrink-0">
            <p className="text-teal-700 font-semibold text-sm">✓ {lastAdded.name}</p>
            {lastAdded.isBread
              ? <p className="text-teal-500 text-xs mt-0.5">Brood: {lastAdded.breadKcal} kcal + Beleg: {lastAdded.belegKcal} kcal = {lastAdded.portionKcal} kcal</p>
              : <p className="text-teal-500 text-xs mt-0.5">{PORTION_LABELS[lastAdded.portion]} · {lastAdded.portionKcal} kcal</p>
            }
            <p className="text-teal-400 text-xs mt-0.5 font-semibold">Dagtotaal: {todayCals.toLocaleString('nl-BE')} kcal</p>
          </div>
        )}
        <div className="flex gap-2 px-4 pb-3 flex-shrink-0">
          {['list', 'custom'].map(t => (
            <button key={t} onClick={() => setTab(t)}
              className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-colors ${tab === t ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'}`}>
              {t === 'list' ? 'Uit de lijst' : 'Zelf toevoegen'}
            </button>
          ))}
        </div>
        {tab === 'list' ? (
          <>
            <div className="flex gap-2 px-4 pb-3 overflow-x-auto flex-shrink-0" style={{ scrollbarWidth: 'none', msOverflowStyle: 'none' }}>
              {FOOD_CATEGORIES.map((cat, i) => (
                <button key={i} onClick={() => handleCatChange(i)}
                  className={`whitespace-nowrap px-3 py-1.5 rounded-xl text-xs font-semibold flex-shrink-0 transition-colors ${catIndex === i ? 'bg-teal-500 text-white' : 'bg-slate-100 text-slate-600'}`}>
                  {cat.name}
                </button>
              ))}
            </div>
            <div className="overflow-y-auto flex-1 px-4 pb-6">
              <ul className="space-y-1.5">
                {FOOD_CATEGORIES[catIndex].items.map((item, i) => {
                  const isSel = selectedItem?.name === item.name;
                  return (
                    <li key={i}>
                      <button
                        onClick={() => isBroodCat ? handleSelectBread(item) : (setSelectedItem(isSel ? null : item), setPortion('normaal'))}
                        className={`w-full flex items-center justify-between px-3.5 py-3 rounded-xl border-2 transition-all text-left
                          ${isSel ? 'border-teal-500 bg-teal-50' : 'border-slate-100 bg-slate-50'}`}>
                        <span className={`text-sm font-semibold ${isSel ? 'text-teal-700' : 'text-slate-700'}`}>{item.name}</span>
                        <span className={`text-xs font-mono font-bold ml-2 shrink-0 ${isSel ? 'text-teal-500' : 'text-slate-400'}`}>{item.kcal} kcal</span>
                      </button>

                      {/* BROOD FLOW */}
                      {isSel && isBroodCat && (
                        <div className="mt-1 p-3 bg-teal-50 border border-teal-100 rounded-xl space-y-3">
                          <p className="text-xs font-bold text-teal-700 uppercase tracking-wider">Stap 2 — Kies beleg</p>
                          <div className="grid grid-cols-2 gap-1.5">
                            {allBeleg.map(beleg => {
                              const isBSel = selectedBeleg?.name === beleg.name;
                              return (
                                <button key={beleg.name} onClick={() => handleSelectBeleg(beleg)}
                                  className={`flex items-center justify-between px-3 py-2.5 rounded-xl border-2 text-left transition-all
                                    ${isBSel ? 'border-teal-500 bg-teal-100' : 'border-white bg-white'}`}>
                                  <span className={`text-xs font-semibold ${isBSel ? 'text-teal-700' : 'text-slate-700'}`}>{beleg.name}</span>
                                  <span className={`text-[10px] font-mono ml-1 shrink-0 ${isBSel ? 'text-teal-500' : 'text-slate-400'}`}>
                                    {beleg.type === 'schelletjes' ? `${beleg.kcalPerSchel}/schel` : 'smeerb.'}
                                  </span>
                                </button>
                              );
                            })}
                          </div>

                          {selectedBeleg && (
                            <div className="space-y-2 pt-1 border-t border-teal-200">
                              <p className="text-xs font-bold text-teal-700 uppercase tracking-wider pt-1">
                                Stap 3 — {selectedBeleg.type === 'schelletjes' ? 'Hoeveel schellen?' : 'Hoeveel gesmeerd?'}
                              </p>
                              <div className={`grid gap-2 ${selectedBeleg.type === 'schelletjes' ? 'grid-cols-4' : 'grid-cols-3'}`}>
                                {selectedBeleg.type === 'schelletjes'
                                  ? [1, 2, 3, 4].map(n => (
                                      <button key={n} onClick={() => setBelegQty(n)}
                                        className={`py-2.5 rounded-xl text-xs font-semibold flex flex-col items-center gap-0.5 transition-colors
                                          ${belegQty === n ? 'bg-teal-500 text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>
                                        <span>{n} {n === 1 ? 'schel' : 'schel.'}</span>
                                        <span className="font-mono">{selectedBeleg.kcalPerSchel * n} kcal</span>
                                      </button>
                                    ))
                                  : ['licht', 'normaal', 'dik'].map(level => (
                                      <button key={level} onClick={() => setBelegQty(level)}
                                        className={`py-2.5 rounded-xl text-xs font-semibold flex flex-col items-center gap-0.5 transition-colors
                                          ${belegQty === level ? 'bg-teal-500 text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>
                                        <span>{level === 'licht' ? 'Licht' : level === 'normaal' ? 'Normaal' : 'Dik'}</span>
                                        <span className="font-mono">{selectedBeleg.kcal[level]} kcal</span>
                                      </button>
                                    ))
                                }
                              </div>
                              {belegQty !== null && (
                                <>
                                  <div className="bg-white rounded-xl px-3 py-2 text-xs text-slate-500 border border-teal-100">
                                    Brood <span className="font-mono font-bold text-slate-800">{item.kcal}</span>
                                    {' '}+ Beleg <span className="font-mono font-bold text-slate-800">{getBelegKcal()}</span>
                                    {' '}= <span className="font-mono font-bold text-teal-700">{breadTotalKcal} kcal</span>
                                  </div>
                                  <Button onClick={handleAddBread} variant="brand" className="w-full">
                                    + {breadTotalKcal} kcal toevoegen
                                  </Button>
                                </>
                              )}
                            </div>
                          )}
                        </div>
                      )}

                      {/* NORMALE PORTIE PICKER */}
                      {isSel && !isBroodCat && (
                        <div className="mt-1 p-3 bg-teal-50 border border-teal-100 rounded-xl space-y-2.5">
                          <div className="grid grid-cols-3 gap-2">
                            {[['klein', 0.8], ['normaal', 1.0], ['groot', 1.3]].map(([key, mult]) => (
                              <button key={key} onClick={() => setPortion(key)}
                                className={`py-2.5 rounded-xl text-xs font-semibold transition-colors flex flex-col items-center gap-0.5
                                  ${portion === key ? 'bg-teal-500 text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>
                                <span>{key === 'klein' ? 'Klein' : key === 'normaal' ? 'Normaal' : 'Groot'}</span>
                                <span className="font-mono">{Math.round(item.kcal * mult)} kcal</span>
                              </button>
                            ))}
                          </div>
                          <Button onClick={handleAddItem} variant="brand" className="w-full">
                            + {selectedKcal} kcal toevoegen
                          </Button>
                        </div>
                      )}
                    </li>
                  );
                })}
              </ul>
            </div>
          </>
        ) : (
          <div className="px-4 space-y-3 overflow-y-auto flex-1 pb-6">
            <Input placeholder="Naam gerecht (optioneel)" value={customName} onChange={e => setCustomName(e.target.value)} />
            <Input type="number" inputMode="numeric" placeholder="Calorieën (kcal)" value={customKcal} onChange={e => setCustomKcal(e.target.value)} />
            <p className="text-xs text-slate-400 font-semibold uppercase tracking-wider">Portiegrootte</p>
            <div className="grid grid-cols-3 gap-2">
              {[['klein', 0.8], ['normaal', 1.0], ['groot', 1.3]].map(([key, mult]) => (
                <button key={key} onClick={() => setCustomPortion(key)}
                  className={`py-2.5 rounded-xl text-xs font-semibold transition-colors flex flex-col items-center gap-0.5
                    ${customPortion === key ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'}`}>
                  <span>{key === 'klein' ? 'Klein' : key === 'normaal' ? 'Normaal' : 'Groot'}</span>
                  {customBase > 0 && <span className="font-mono">{Math.round(customBase * mult)} kcal</span>}
                </button>
              ))}
            </div>
            <Button onClick={handleAddCustom} variant="brand" className="w-full" disabled={!customKcal || parseInt(customKcal, 10) <= 0}>
              Toevoegen
            </Button>
          </div>
        )}
      </div>
    </div>
  );
}

function CalorieTracker() {
  const { state, addFoodItem, deleteFoodItem, setCalorieGoal, toggleCheck, todayKey } = useStore();
  const today = todayKey();
  const todayCals = state.dailyCalories?.[today] || 0;
  const goal = state.calorieGoal;
  const pct = Math.min(100, (todayCals / goal) * 100);
  const remaining = Math.max(0, goal - todayCals);
  const creatineDone = state.today.creatine;
  const foodLog = state.dailyFoodLog?.[today] || [];

  const [showModal, setShowModal] = React.useState(false);
  const [goalInput, setGoalInput] = React.useState('');
  const [editingGoal, setEditingGoal] = React.useState(false);

  const handleSetGoal = () => { const val = goalInput.trim(); if (!val) return; setCalorieGoal(val); setGoalInput(''); setEditingGoal(false); };
  const history = Object.entries(state.dailyCalories || {}).sort((a, b) => a[0] < b[0] ? 1 : -1).slice(0, 14);
  const calColor = pct >= 100 ? 'green' : pct >= 80 ? 'amber' : 'teal';
  const PORTION_LABELS = { klein: 'Klein', normaal: 'Normaal', groot: 'Groot' };

  return (
    <div className="space-y-4">
      {showModal && <FoodLogModal onClose={() => setShowModal(false)} onAdd={item => addFoodItem(today, item)} todayCals={todayCals} />}

      <div className="pt-2">
        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Vandaag</p>
        <h1 className="text-2xl font-bold text-slate-900 mt-0.5">Calorieën</h1>
      </div>

      <Card className="p-5">
        <div className="flex items-end justify-between mb-4">
          <div>
            <p className="text-xs text-slate-400 font-semibold mb-1">Vandaag gegeten</p>
            <div className="flex items-baseline gap-1.5">
              <span className="text-5xl font-bold font-mono text-slate-900">{todayCals.toLocaleString('nl-BE')}</span>
              <span className="text-base text-slate-400 font-mono">kcal</span>
            </div>
          </div>
          <div className="text-right">
            <p className="text-xs text-slate-400 font-semibold">Doel</p>
            <p className="text-2xl font-bold font-mono text-slate-900">{goal.toLocaleString('nl-BE')}</p>
          </div>
        </div>
        <ProgressBar value={todayCals} max={goal} color={calColor} className="h-4 mb-3" />
        <div className="flex items-center justify-between">
          <span className={`text-sm font-bold ${pct >= 100 ? 'text-green-600' : 'text-slate-500'}`}>
            {pct >= 100 ? '✓ Doel gehaald!' : `${remaining.toLocaleString('nl-BE')} kcal resterend`}
          </span>
          <span className="text-sm font-mono font-bold text-slate-400">{Math.round(pct)}%</span>
        </div>
      </Card>

      <Card className="p-4">
        <div className="flex items-center justify-between mb-3">
          <h2 className="font-bold text-slate-900">Vandaag gegeten</h2>
          <Button onClick={() => setShowModal(true)} variant="brand" className="py-2 px-3 text-xs">+ Log calorieën</Button>
        </div>
        {foodLog.length === 0 ? (
          <p className="text-sm text-slate-300 text-center py-4">Nog niets gelogd vandaag</p>
        ) : (
          <ul className="divide-y divide-slate-50">
            {foodLog.map((item, i) => (
              <li key={i} className="flex items-center gap-3 py-2.5">
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-semibold text-slate-800 truncate">{item.name}</p>
                  <p className="text-xs text-slate-400">{PORTION_LABELS[item.portion] || item.portion}</p>
                </div>
                <span className="text-sm font-bold font-mono text-teal-600 shrink-0">{item.portionKcal} kcal</span>
                <button onClick={() => deleteFoodItem(today, i)} className="text-slate-200 hover:text-red-400 transition-colors p-1 shrink-0">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </li>
            ))}
          </ul>
        )}
      </Card>

      <Card className="p-4">
        <h2 className="font-bold text-slate-900 mb-3">Supplementen</h2>
        <button onClick={() => toggleCheck('creatine')} disabled={state.today.completed}
          className={`w-full flex items-center gap-4 rounded-xl border-2 p-4 transition-all active:scale-[0.98] text-left
            ${creatineDone ? 'border-teal-500 bg-teal-50' : 'border-slate-100 bg-slate-50'}
            ${state.today.completed ? 'opacity-60 cursor-not-allowed' : 'cursor-pointer'}`}>
          <span className="text-2xl">💊</span>
          <div className="flex-1">
            <p className={`font-semibold ${creatineDone ? 'text-teal-700' : 'text-slate-800'}`}>Creatine vandaag genomen</p>
            <p className="text-xs text-slate-400 mt-0.5">5g per dag aanbevolen</p>
          </div>
          <div className={`w-7 h-7 rounded-full border-2 flex items-center justify-center shrink-0 transition-all ${creatineDone ? 'border-teal-500 bg-teal-500' : 'border-slate-300'}`}>
            {creatineDone && <svg width="14" height="14" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.5L5 9L9.5 3.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
        </button>
      </Card>

      <Card className="p-4">
        <div className="flex items-center justify-between mb-3">
          <h2 className="font-bold text-slate-900">Dagelijks doel</h2>
          <button onClick={() => { setEditingGoal(!editingGoal); setGoalInput(''); }} className="text-xs font-semibold" style={{ color: '#14b8a6' }}>
            {editingGoal ? 'Annuleer' : 'Wijzigen'}
          </button>
        </div>
        {editingGoal ? (
          <div className="space-y-3">
            <Input type="number" inputMode="numeric" min="500" max="10000" value={goalInput}
              onChange={e => setGoalInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSetGoal()}
              placeholder={`Huidig: ${goal.toLocaleString('nl-BE')} kcal`} autoFocus />
            <Button onClick={handleSetGoal} variant="brand" className="w-full">Opslaan</Button>
          </div>
        ) : (
          <div className="flex items-baseline gap-2">
            <span className="text-3xl font-bold font-mono text-slate-900">{goal.toLocaleString('nl-BE')}</span>
            <span className="text-slate-400 font-medium">kcal / dag</span>
          </div>
        )}
      </Card>

      {history.length > 0 && (
        <div>
          <SectionLabel>Geschiedenis (14 dagen)</SectionLabel>
          <Card>
            <ul className="divide-y divide-slate-100">
              {history.map(([date, kcal]) => {
                const met = kcal >= goal, dayPct = Math.round((kcal / goal) * 100), isToday = date === today;
                return (
                  <li key={date} className="px-4 py-3">
                    <div className="flex items-center gap-3 mb-1.5">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <p className="text-sm font-bold font-mono text-slate-900">{kcal.toLocaleString('nl-BE')} kcal</p>
                          {isToday && <Badge color="teal">Vandaag</Badge>}
                        </div>
                        <p className="text-xs text-slate-400 mt-0.5">{fmtDate(date)}</p>
                      </div>
                      <Badge color={met ? 'green' : dayPct >= 80 ? 'amber' : 'slate'}>{met ? '✓ Doel' : `${dayPct}%`}</Badge>
                    </div>
                    <ProgressBar value={kcal} max={goal} color={met ? 'green' : dayPct >= 80 ? 'amber' : 'teal'} className="h-1.5" />
                  </li>
                );
              })}
            </ul>
          </Card>
        </div>
      )}

      {history.length === 0 && (
        <Card className="p-10 text-center"><p className="text-4xl mb-3">🥗</p><p className="text-slate-500 text-sm">Log je eerste calorieën om de geschiedenis te zien.</p></Card>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════════

function AppInner() {
  const [page, setPage] = React.useState('dashboard');
  const { state, dismissGain } = useStore();
  const pages = { dashboard: <Dashboard />, workout: <WorkoutPlanner />, weight: <WeightTracker />, calories: <CalorieTracker /> };

  return (
    <div className="min-h-screen bg-slate-50 font-sans">
      {state.lastGain && <Celebration gain={state.lastGain} onDismiss={dismissGain} />}
      <main className="max-w-lg mx-auto px-4 pt-4 pb-24">{pages[page]}</main>
      <Navbar current={page} onChange={setPage} />
    </div>
  );
}

function App() {
  return (
    <StoreProvider>
      <AppInner />
    </StoreProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    </script>
  </body>
